<script>
async function checkNumber() {
  const phone = document.getElementById("phone").value.trim();
  const resultBox = document.getElementById("result");
  const loading = document.getElementById("loading");

  if (phone.length < 10) {
    alert("Enter valid number");
    return;
  }

  resultBox.style.display = "block";
  resultBox.innerHTML = "";
  loading.innerText = "Checking...";

  try {
    const res = await fetch("/api/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone })
    });

    console.log("Response status:", res.status);

    const data = await res.json();
    console.log("API Data:", data);

    loading.innerText = "";

    if (data.status === "fresh") {
      resultBox.innerHTML = "🟢 Fresh Number";
      resultBox.style.background = "#062e1f";
      resultBox.style.color = "#00ff9d";
    } else {
      resultBox.innerHTML = "🔴 Registered";
      resultBox.style.background = "#2a0b0b";
      resultBox.style.color = "#ff4d4d";
    }

  } catch (err) {
    console.error(err);
    loading.innerText = "";
    resultBox.innerHTML = "❌ API Error";
    resultBox.style.color = "red";
  }
}
</script>
