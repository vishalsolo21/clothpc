<!DOCTYPE html>
<html>
<head>
  <title>Myntra Number Checker</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #ff3f6c;
      color: white;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h2>Myntra Number Checker</h2>

<input type="text" id="phone" placeholder="Enter mobile number" />
<br>
<button onclick="checkNumber()">Check</button>

<div id="result"></div>

<script>
async function checkNumber() {
  const phone = document.getElementById("phone").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerText = "Checking...";

  try {
    const res = await fetch("/api/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone })
    });

    const data = await res.json();

    if (data.status === "registered") {
      resultDiv.innerText = "✅ Registered Number";
    } else {
      resultDiv.innerText = "❌ Not Registered";
    }

  } catch (err) {
    resultDiv.innerText = "Error checking number";
  }
}
</script>

</body>
</html>
