<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Checker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  background: #1f1f1f;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  text-align: center;
}

h2 {
  color: #ff3f6c;
  margin-bottom: 20px;
}

input {
  width: 65%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  background: #ff3f6c;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#loading {
  margin-top: 15px;
  font-size: 14px;
}

#result {
  margin-top: 15px;
  padding: 12px;
  border-radius: 8px;
  display: none;
}

.footer {
  margin-top: 15px;
  font-size: 13px;
}

.footer span {
  color: #00ff9d;
}
</style>
</head>

<body>

<div class="container">
  <h2>Number Checker</h2>

  <input type="number" id="phone" placeholder="Enter number">
  <button onclick="checkNumber()">Check</button>

  <div id="loading"></div>
  <div id="result"></div>

  <div class="footer">
    Made with ❤️ by Vishal | <span>RAIGANJLOOTERS</span>
  </div>
</div>

<script>
async function checkNumber() {
  const phone = document.getElementById("phone").value.trim();
  const result = document.getElementById("result");
  const loading = document.getElementById("loading");

  if (phone.length < 10) {
    alert("Enter valid number");
    return;
  }

  loading.innerText = "Checking...";
  result.style.display = "none";

  try {
    const res = await fetch("/api/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone })
    });

    const data = await res.json();

    loading.innerText = "";
    result.style.display = "block";

    if (data.status === "fresh") {
      result.innerHTML = "🟢 Fresh Number";
      result.style.background = "#062e1f";
      result.style.color = "#00ff9d";
    } else {
      result.innerHTML = "🔴 Registered";
      result.style.background = "#2a0b0b";
      result.style.color = "#ff4d4d";
    }

  } catch (err) {
    loading.innerText = "";
    result.style.display = "block";
    result.innerHTML = "❌ Error";
    result.style.color = "red";
  }
}
</script>

</body>
</html>
