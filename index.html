<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiggy Number Checker</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #111, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 92%;
  max-width: 420px;
  background: #1f1f1f;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
}

h1 {
  margin-bottom: 20px;
  color: #ff3f6c;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
}

button {
  padding: 14px 18px;
  border: none;
  border-radius: 10px;
  background: #ff3f6c;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#loading {
  margin-top: 15px;
  font-size: 14px;
}

#result {
  margin-top: 18px;
  padding: 14px;
  border-radius: 10px;
  display: none;
  font-size: 18px;
}

.footer {
  margin-top: 20px;
  font-size: 13px;
}

.footer span {
  color: #00ff9d;
}
</style>
</head>
<body>

<div class="container">
  <h1>Number Checker</h1>

  <div class="input-row">
    <input type="number" id="phone" placeholder="Enter mobile number">
    <button onclick="checkNumber()">Check</button>
  </div>

  <div id="loading"></div>
  <div id="result"></div>

  <div class="footer">
    Made with ❤️ by Vishal | <span>RAIGANJLOOTERS</span>
  </div>
</div>

<script>
async function checkNumber() {
  const phone = document.getElementById("phone").value.trim();
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");

  if (phone.length < 10) {
    alert("Enter valid mobile number");
    return;
  }

  loading.innerText = "Checking...";
  result.style.display = "none";

  try {
    const res = await fetch("/api/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone })
    });

    const data = await res.json();

    loading.innerText = "";
    result.style.display = "block";

    if (data.registered === true) {
      result.innerHTML = "🔴 Registered Number";
      result.style.background = "#2a0b0b";
      result.style.color = "#ff4d4d";
    } else {
      result.innerHTML = "🟢 Fresh Number";
      result.style.background = "#062e1f";
      result.style.color = "#00ff9d";
    }

  } catch (err) {
    loading.innerText = "";
    result.style.display = "block";
    result.innerHTML = "❌ API Error";
    result.style.background = "#2a0b0b";
    result.style.color = "#ff4d4d";
  }
}
</script>

</body>
</html>
